<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Phantom Wallet - Infinitecoin Jumper</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
        }
        .logo { font-size: 4rem; margin-bottom: 1rem; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { opacity: 0.9; margin-bottom: 2rem; line-height: 1.6; }
        .wallet-btn {
            background: #512DA8;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .wallet-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .wallet-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }
        .status.success { background: rgba(76, 175, 80, 0.2); display: block; }
        .status.error { background: rgba(244, 67, 54, 0.2); display: block; }
        .status.loading { background: rgba(255, 193, 7, 0.2); display: block; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎮</div>
        <h1>Infinitecoin Jumper</h1>
        <p>Connect your Phantom wallet to start earning IFC tokens</p>
        
        <button class="wallet-btn" id="connectBtn" onclick="connectWallet()">
            <span>👻</span> Connect Phantom Wallet
        </button>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user');
        
        if (!userId) {
            showStatus('error', '❌ Invalid link. Please start from Telegram bot.');
            document.getElementById('connectBtn').disabled = true;
        }

        function showStatus(type, message) {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            status.innerHTML = message;
        }

        async function connectWallet() {
            const btn = document.getElementById('connectBtn');
            btn.disabled = true;
            showStatus('loading', '<span class="spinner"></span> Connecting to Phantom...');

            try {
                const provider = window.solana;
                if (!provider || !provider.isPhantom) {
                    showStatus('error', '❌ Phantom wallet not found. Please install Phantom extension or app.');
                    btn.disabled = false;
                    return;
                }

                const response = await provider.connect();
                const walletAddress = response.publicKey.toString();

                showStatus('loading', '<span class="spinner"></span> Confirming connection...');

                const apiUrl = window.location.origin + '/api/connect-wallet';
                const res = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        walletAddress: walletAddress
                    })
                });

                const data = await res.json();

                if (data.success) {
                    showStatus('success', 
                        `✅ Wallet connected successfully!<br><br>` +
                        `🔗 <code>${walletAddress}</code><br><br>` +
                        `You can now close this page and return to Telegram.`
                    );
                    btn.innerHTML = '<span>✅</span> Connected';
                } else {
                    throw new Error(data.error || 'Connection failed');
                }

            } catch (err) {
                console.error('Connection error:', err);
                showStatus('error', '❌ ' + (err.message || 'Failed to connect wallet'));
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
