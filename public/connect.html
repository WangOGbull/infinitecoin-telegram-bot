<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Wallet - Infinitecoin Jumper</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .logo { font-size: 5rem; margin-bottom: 1rem; animation: bounce 2s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .subtitle { opacity: 0.9; margin-bottom: 2rem; }
        .wallet-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .wallet-input {
            width: 100%;
            padding: 1rem;
            border-radius: 10px;
            border: none;
            margin: 1rem 0;
            font-size: 1rem;
            font-family: monospace;
        }
        .submit-btn {
            background: #512DA8;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(81, 45, 168, 0.4);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            display: none;
        }
        .status.success { background: rgba(76, 175, 80, 0.3); display: block; }
        .status.error { background: rgba(244, 67, 54, 0.3); display: block; }
        .status.loading { background: rgba(255, 193, 7, 0.3); display: block; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .wallet-display {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
            font-family: monospace;
            font-size: 1.1rem;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎮</div>
        <h1>Infinitecoin Jumper</h1>
        <p class="subtitle">Complete your wallet connection</p>
        
        <div class="wallet-card">
            <p>Enter your Phantom wallet address:</p>
            <input type="text" class="wallet-input" id="walletInput" 
                   placeholder="Paste wallet address here...">
            <button class="submit-btn" id="submitBtn" onclick="submitWallet()">
                Connect Wallet
            </button>
            <div class="status" id="status"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const session = urlParams.get('session') || 'direct';
        const userId = urlParams.get('user');

        function showStatus(type, message) {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            status.innerHTML = message;
        }

        async function submitWallet() {
            const wallet = document.getElementById('walletInput').value.trim();
            const btn = document.getElementById('submitBtn');
            
            if (!wallet || wallet.length < 32) {
                showStatus('error', '❌ Please enter a valid wallet address');
                return;
            }
            
            btn.disabled = true;
            showStatus('loading', '<span class="spinner"></span> Connecting...');
            
            try {
                const res = await fetch('/api/complete-connection', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        session: session, 
                        userId: userId, 
                        walletAddress: wallet 
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showStatus('success', 
                        `✅ Wallet Connected!<br>` +
                        `<div class="wallet-display">${data.maskedWallet}</div><br>` +
                        `You can close this page and return to Telegram.`
                    );
                    btn.style.display = 'none';
                } else {
                    throw new Error(data.error || 'Connection failed');
                }
            } catch (err) {
                showStatus('error', '❌ ' + err.message);
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
